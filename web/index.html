<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diago Playground - D2 Diagram Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #16213e;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }
    header h1 span {
      color: #e94560;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-right a {
      color: #888;
      text-decoration: none;
      font-size: 0.875rem;
    }
    .header-right a:hover {
      color: #fff;
    }
    .container {
      display: flex;
      height: calc(100vh - 52px);
    }
    .editor-pane {
      width: 40%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane-header {
      background: #16213e;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    textarea {
      flex: 1;
      background: #0f0f23;
      color: #e0e0e0;
      border: none;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    textarea::placeholder {
      color: #444;
    }
    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: auto;
      background: #fff;
    }
    .preview-content.dark {
      background: #0f0f23;
    }
    .preview-content svg {
      max-width: 100%;
      max-height: 100%;
    }
    .ascii-output {
      background: #0f0f23;
      color: #00ff88;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre;
      padding: 1rem;
      overflow: auto;
      text-align: left;
      display: block;
    }
    .toolbar {
      background: #16213e;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
    }
    button:hover {
      background: #ff6b6b;
    }
    button:disabled {
      background: #444;
      cursor: not-allowed;
    }
    button.secondary {
      background: #0f3460;
    }
    button.secondary:hover {
      background: #1a4a7a;
    }
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      background: transparent;
      border-radius: 0;
      color: #888;
      padding: 0.4rem 1rem;
    }
    .tab:hover {
      background: #0f3460;
      color: #fff;
    }
    .tab.active {
      background: #0f3460;
      color: #fff;
    }
    .spacer {
      flex: 1;
    }
    .error-banner {
      background: #3d1a1a;
      color: #ff6b6b;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      border-bottom: 1px solid #5a2a2a;
    }
    .status {
      font-size: 0.75rem;
      color: #666;
    }
    .status.ready {
      color: #00ff88;
    }
    .status.loading {
      color: #ffaa00;
    }
    .status.error {
      color: #ff6b6b;
    }
    select {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    select:focus {
      outline: 1px solid #e94560;
    }
    .resize-handle {
      width: 4px;
      background: #0f3460;
      cursor: col-resize;
      transition: background 0.2s;
    }
    .resize-handle:hover {
      background: #e94560;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Diago</span> Playground</h1>
    <div class="header-right">
      <span id="status" class="status loading">Loading WASM...</span>
      <a href="https://github.com/moonbitlang/diago" target="_blank">GitHub</a>
    </div>
  </header>

  <div class="container">
    <div class="editor-pane" id="editor-pane">
      <div class="pane-header">
        <span>D2 Source</span>
        <select id="example-select">
          <option value="">Load Example...</option>
          <option value="hello">Hello World</option>
          <option value="basic">Basic Features</option>
          <option value="shapes">Shape Types</option>
          <option value="styles">Styling</option>
          <option value="containers">Containers</option>
          <option value="classes">Classes</option>
          <option value="variables">Variables</option>
          <option value="directions">Directions</option>
          <option value="grid">Grid Layout</option>
          <option value="sequence">Sequence Diagram</option>
          <option value="architecture">Architecture</option>
        </select>
      </div>
      <div class="editor-wrapper">
        <textarea id="editor" spellcheck="false" placeholder="# Enter D2 diagram code here

server: Web Server
database: Database

server -> database: queries"></textarea>
      </div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <div class="preview-pane">
      <div class="toolbar">
        <div class="tabs">
          <button class="tab active" data-view="svg">SVG</button>
          <button class="tab" data-view="ascii">ASCII</button>
        </div>
        <div class="spacer"></div>
        <button id="render-btn">Render</button>
        <button id="copy-btn" class="secondary">Copy Output</button>
      </div>
      <div id="error-banner" class="error-banner" style="display: none;"></div>
      <div id="preview" class="preview-content">
        <div class="status loading">Initializing...</div>
      </div>
    </div>
  </div>

  <script type="module">
    // Examples
    const examples = {
      hello: `# Basic D2 example - Hello World
# Simple nodes and connections

x -> y`,

      basic: `# Basic D2 features

# Nodes with labels
server: Web Server
database: PostgreSQL

# Connections
server -> database: queries

# Bidirectional
client <-> server: HTTP

# Chain connections
user -> client -> server -> database`,

      shapes: `# All D2 shape types

rectangle.shape: rectangle
square.shape: square
page.shape: page
parallelogram.shape: parallelogram
document.shape: document
cylinder.shape: cylinder
queue.shape: queue
package.shape: package
step.shape: step
callout.shape: callout
stored_data.shape: stored_data
person.shape: person
diamond.shape: diamond
oval.shape: oval
circle.shape: circle
hexagon.shape: hexagon
cloud.shape: cloud

# Connections between shapes
rectangle -> square -> page
parallelogram -> document -> cylinder
queue -> package -> step
callout -> stored_data -> person
diamond -> oval -> circle
hexagon -> cloud`,

      styles: `# D2 styling examples

# Colors and fills
server: Web Server {
  style: {
    fill: "#e8f4f8"
    stroke: "#2196F3"
    stroke-width: 2
  }
}

database: Database {
  shape: cylinder
  style: {
    fill: "#fff3e0"
    stroke: "#FF9800"
    stroke-width: 2
    shadow: true
  }
}

# Font styling
important: Important Node {
  style: {
    fill: "#ffebee"
    stroke: red
    bold: true
    font-size: 18
  }
}

# Dashed connections
server -> database: queries {
  style: {
    stroke-dash: 5
    stroke: "#666"
  }
}

# Multiple/stacked appearance
queue: Task Queue {
  shape: queue
  style: {
    multiple: true
    fill: "#e8f5e9"
  }
}

# 3D effect
box3d: 3D Box {
  style: {
    3d: true
    fill: "#f3e5f5"
  }
}

server -> queue -> important
database -> box3d`,

      containers: `# D2 containers (nested structures)

aws: AWS Cloud {
  vpc: VPC {
    subnet: Private Subnet {
      server: EC2 Instance
      database: RDS
    }
  }

  cdn: CloudFront
  s3: S3 Bucket
}

# Connection from outside to inside
user -> aws.cdn
aws.cdn -> aws.vpc.subnet.server

# Connection inside container
aws.vpc.subnet.server -> aws.vpc.subnet.database
aws.vpc.subnet.server -> aws.s3`,

      classes: `# D2 classes example

classes: {
  server: {
    shape: rectangle
    style: {
      fill: "#e3f2fd"
      stroke: "#1976D2"
      stroke-width: 2
    }
  }

  database: {
    shape: cylinder
    style: {
      fill: "#fff8e1"
      stroke: "#FFA000"
      stroke-width: 2
    }
  }

  user: {
    shape: person
    style: {
      fill: "#f3e5f5"
    }
  }
}

web1: Web Server 1 {
  class: server
}

web2: Web Server 2 {
  class: server
}

db1: Primary DB {
  class: database
}

db2: Replica DB {
  class: database
}

alice: Alice {
  class: user
}

bob: Bob {
  class: user
}

alice -> web1
bob -> web2
web1 -> db1
web2 -> db1
db1 -> db2: replication`,

      variables: `# D2 variable substitution example

vars: {
  primary-color: "#2196F3"
  secondary-color: "#FF9800"
  success-color: "#4CAF50"
  error-color: "#f44336"
}

header: Header {
  style.fill: \${primary-color}
}

sidebar: Sidebar {
  style.fill: \${secondary-color}
}

success: Success Message {
  style.fill: \${success-color}
}

error: Error Message {
  style.fill: \${error-color}
}

header -> sidebar
sidebar -> success
sidebar -> error`,

      directions: `# D2 direction examples

down_flow: Down (default) {
  direction: down
  a -> b -> c
}

right_flow: Right {
  direction: right
  a -> b -> c
}

left_flow: Left {
  direction: left
  a -> b -> c
}

up_flow: Up {
  direction: up
  a -> b -> c
}

down_flow -> right_flow
right_flow -> left_flow
left_flow -> up_flow`,

      grid: `# D2 grid layout example

grid_container: Dashboard {
  grid-rows: 2
  grid-columns: 3

  header: Header {
    style.fill: "#e3f2fd"
  }

  nav: Navigation {
    style.fill: "#fff3e0"
  }

  search: Search {
    style.fill: "#f3e5f5"
  }

  sidebar: Sidebar {
    style.fill: "#e8f5e9"
  }

  content: Main Content {
    style.fill: "#fafafa"
  }

  footer: Footer {
    style.fill: "#eceff1"
  }
}

# Another grid example
icons: Icon Grid {
  grid-rows: 3
  grid-columns: 4
  grid-gap: 10

  i1; i2; i3; i4
  i5; i6; i7; i8
  i9; i10; i11; i12
}`,

      sequence: `# D2 sequence diagram example

shape: sequence_diagram

alice: Alice
bob: Bob
server: Server

alice -> bob: Hello
bob -> alice: "Hi there!"
alice -> server: Request data
server -> alice: Response
bob -> server: Another request
server -> bob: Another response`,

      architecture: `# D2 architecture diagram example

title: Web Application Architecture {
  style: {
    font-size: 24
    bold: true
  }
}

users: Users {
  shape: person
  style.multiple: true
}

cdn: CDN {
  shape: cloud
  style.fill: "#e3f2fd"
}

load_balancer: Load Balancer {
  shape: hexagon
  style.fill: "#fff3e0"
}

web_tier: Web Tier {
  style.fill: "#e8f5e9"

  web1: Web Server 1
  web2: Web Server 2
  web3: Web Server 3
}

app_tier: Application Tier {
  style.fill: "#f3e5f5"

  app1: App Server 1
  app2: App Server 2
}

cache: Redis Cache {
  shape: cylinder
  style.fill: "#ffebee"
}

database: Database Cluster {
  style.fill: "#fff8e1"

  primary: Primary DB {
    shape: cylinder
  }
  replica1: Replica 1 {
    shape: cylinder
  }
  replica2: Replica 2 {
    shape: cylinder
  }

  primary -> replica1: sync
  primary -> replica2: sync
}

queue: Message Queue {
  shape: queue
  style.fill: "#e0f2f1"
}

workers: Background Workers {
  style.fill: "#fce4ec"

  worker1: Worker 1
  worker2: Worker 2
}

storage: Object Storage {
  shape: stored_data
  style.fill: "#f5f5f5"
}

# Connections
users -> cdn
cdn -> load_balancer
load_balancer -> web_tier.web1
load_balancer -> web_tier.web2
load_balancer -> web_tier.web3

web_tier.web1 -> app_tier.app1
web_tier.web2 -> app_tier.app1
web_tier.web2 -> app_tier.app2
web_tier.web3 -> app_tier.app2

app_tier.app1 -> cache
app_tier.app2 -> cache
app_tier.app1 -> database.primary
app_tier.app2 -> database.primary

app_tier.app1 -> queue
app_tier.app2 -> queue
queue -> workers.worker1
queue -> workers.worker2

workers.worker1 -> storage
workers.worker2 -> storage
workers.worker1 -> database.primary`
    };

    // State
    let wasmModule = null;
    let currentView = 'svg';
    let renderTimeout = null;

    // DOM elements
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const errorBanner = document.getElementById('error-banner');
    const renderBtn = document.getElementById('render-btn');
    const copyBtn = document.getElementById('copy-btn');
    const exampleSelect = document.getElementById('example-select');
    const statusEl = document.getElementById('status');
    const tabs = document.querySelectorAll('.tab');
    const editorPane = document.getElementById('editor-pane');
    const resizeHandle = document.getElementById('resize-handle');

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.dataset.view;
        render();
      });
    });

    // Example loading
    exampleSelect.addEventListener('change', () => {
      const key = exampleSelect.value;
      if (key && examples[key]) {
        editor.value = examples[key];
        exampleSelect.value = '';
        render();
      }
    });

    // Render button
    renderBtn.addEventListener('click', render);

    // Copy button
    copyBtn.addEventListener('click', () => {
      const content = currentView === 'ascii'
        ? preview.textContent
        : preview.innerHTML;
      navigator.clipboard.writeText(content).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Output', 1500);
      });
    });

    // Auto-render on input (debounced)
    editor.addEventListener('input', () => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(render, 300);
    });

    // Resize handle
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const containerRect = document.querySelector('.container').getBoundingClientRect();
      const newWidth = e.clientX - containerRect.left;
      const minWidth = 250;
      const maxWidth = containerRect.width - 300;
      if (newWidth >= minWidth && newWidth <= maxWidth) {
        editorPane.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // WASM loading
    async function loadWasm() {
      try {
        statusEl.textContent = 'Loading WASM...';
        statusEl.className = 'status loading';

        const response = await fetch('./wasm.wasm');
        if (!response.ok) {
          throw new Error(`Failed to fetch WASM: ${response.status}`);
        }

        const wasmBytes = await response.arrayBuffer();
        const result = await WebAssembly.instantiate(wasmBytes, {
          spectest: {
            print_char: (c) => console.log(String.fromCharCode(c)),
            print_i32: (i) => console.log(i),
            print_f64: (f) => console.log(f),
          }
        });

        wasmModule = result.instance.exports;
        statusEl.textContent = 'Ready';
        statusEl.className = 'status ready';
        render();
      } catch (e) {
        console.error('WASM load error:', e);
        statusEl.textContent = 'WASM not available';
        statusEl.className = 'status error';
        showPlaceholder();
      }
    }

    function showPlaceholder() {
      preview.className = 'preview-content dark';
      preview.innerHTML = `
        <div style="text-align: center; color: #666;">
          <p style="margin-bottom: 1rem;">WASM module not loaded.</p>
          <p style="font-size: 0.8rem;">Build with: <code style="background: #1a1a2e; padding: 0.25rem 0.5rem; border-radius: 4px;">moon build --target wasm</code></p>
          <p style="font-size: 0.8rem; margin-top: 0.5rem;">Then copy <code style="background: #1a1a2e; padding: 0.25rem 0.5rem; border-radius: 4px;">target/wasm/release/build/cmd/wasm/wasm.wasm</code> to <code style="background: #1a1a2e; padding: 0.25rem 0.5rem; border-radius: 4px;">web/</code></p>
        </div>
      `;
    }

    function setInput(str) {
      const len = str.length;
      wasmModule.set_input(len);
      for (let i = 0; i < len; i++) {
        wasmModule.write_input_byte(i, str.charCodeAt(i));
      }
    }

    function getOutput() {
      const len = wasmModule.get_output_len();
      let result = '';
      for (let i = 0; i < len; i++) {
        result += String.fromCharCode(wasmModule.read_output_byte(i));
      }
      return result;
    }

    function render() {
      const source = editor.value;
      errorBanner.style.display = 'none';

      if (!source.trim()) {
        preview.className = 'preview-content dark';
        preview.innerHTML = '<div style="color: #666;">Enter D2 code to see the diagram</div>';
        return;
      }

      if (!wasmModule) {
        showPlaceholder();
        return;
      }

      try {
        setInput(source);

        let status;
        if (currentView === 'ascii') {
          status = wasmModule.render_ascii();
        } else {
          status = wasmModule.render_svg();
        }

        const output = getOutput();

        if (status !== 0) {
          errorBanner.textContent = output;
          errorBanner.style.display = 'block';
          return;
        }

        if (currentView === 'ascii') {
          preview.className = 'preview-content dark ascii-output';
          preview.textContent = output;
        } else {
          preview.className = 'preview-content';
          preview.innerHTML = output;
        }
      } catch (e) {
        errorBanner.textContent = 'Render error: ' + e.message;
        errorBanner.style.display = 'block';
      }
    }

    // Handle Tab key in editor
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    // Initialize
    editor.value = examples.hello;
    loadWasm();
  </script>
</body>
</html>
