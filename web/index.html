<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diago Playground - diago Diagram Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #16213e;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }
    header h1 span {
      color: #e94560;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-right a {
      color: #888;
      text-decoration: none;
      font-size: 0.875rem;
    }
    .header-right a:hover {
      color: #fff;
    }
    .container {
      display: flex;
      height: calc(100vh - 52px);
    }
    .editor-pane {
      width: 40%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane-header {
      background: #16213e;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    textarea {
      flex: 1;
      background: #0f0f23;
      color: #e0e0e0;
      border: none;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    textarea::placeholder {
      color: #444;
    }
    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: auto;
      background: #fff;
    }
    .preview-content.svg-mode {
      display: block;
      padding: 0;
      overflow: hidden;
      background: #fff;
    }
    .preview-content.dark {
      background: #0f0f23;
    }
    .preview-content svg {
      max-width: 100%;
      max-height: 100%;
    }
    .preview-content.ascii-mode {
      display: block;
      padding: 0;
    }
    .svg-viewport {
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: grab;
      touch-action: none;
    }
    .svg-viewport.panning {
      cursor: grabbing;
    }
    .svg-canvas {
      min-width: 1px;
      min-height: 1px;
    }
    .svg-controls {
      display: none;
      align-items: center;
      gap: 0.25rem;
    }
    .svg-controls button {
      min-width: 2rem;
      padding: 0.35rem 0.55rem;
      line-height: 1;
    }
    #zoom-reset-btn {
      min-width: 3.5rem;
      font-variant-numeric: tabular-nums;
    }
    .ascii-output {
      background: #0f0f23;
      color: #00ff88;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre;
      padding: 1rem;
      margin: 0;
      overflow: auto;
      text-align: left;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }
    .toolbar {
      background: #16213e;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
    }
    button:hover {
      background: #ff6b6b;
    }
    button:disabled {
      background: #444;
      cursor: not-allowed;
    }
    button.secondary {
      background: #0f3460;
    }
    button.secondary:hover {
      background: #1a4a7a;
    }
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      background: transparent;
      border-radius: 0;
      color: #888;
      padding: 0.4rem 1rem;
    }
    .tab:hover {
      background: #0f3460;
      color: #fff;
    }
    .tab.active {
      background: #0f3460;
      color: #fff;
    }
    .engine-tabs {
      display: flex;
      gap: 0;
      margin-left: 0.5rem;
    }
    .engine-tab {
      background: transparent;
      border-radius: 0;
      color: #666;
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
    }
    .engine-tab:hover {
      background: #0f3460;
      color: #fff;
    }
    .engine-tab.active {
      background: #e94560;
      color: #fff;
    }
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toolbar-label {
      color: #888;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .spacer {
      flex: 1;
    }
    .error-banner {
      background: #3d1a1a;
      color: #ff6b6b;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      border-bottom: 1px solid #5a2a2a;
    }
    .status {
      font-size: 0.75rem;
      color: #666;
    }
    .status.ready {
      color: #00ff88;
    }
    .status.loading {
      color: #ffaa00;
    }
    .status.error {
      color: #ff6b6b;
    }
    .resize-handle {
      width: 4px;
      background: #0f3460;
      cursor: col-resize;
      transition: background 0.2s;
    }
    .resize-handle:hover {
      background: #e94560;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Diago</span> Playground</h1>
    <div class="header-right">
      <span id="status" class="status loading">Loading renderer...</span>
      <a href="https://github.com/moonbit-community/diago" target="_blank">GitHub</a>
    </div>
  </header>

  <div class="container">
    <div class="editor-pane" id="editor-pane">
      <div class="pane-header">
        <span>diago Source</span>
        <select id="example-select">
          <option value="hello">Hello World</option>
          <option value="basic">Basic Features</option>
          <option value="shapes">Shape Types</option>
          <option value="styles">Styling</option>
          <option value="containers">Containers</option>
          <option value="classes">Classes</option>
          <option value="sql_tables">SQL Tables</option>
          <option value="variables">Variables</option>
          <option value="directions">Directions</option>
          <option value="grid">Grid Layout</option>
          <option value="sequence">Sequence Diagram</option>
          <option value="architecture">Architecture</option>
          <option value="arrowheads">Arrowheads</option>
          <option value="c4">C4 Diagram</option>
          <option value="layers">Layers</option>
        </select>
      </div>
      <div class="editor-wrapper">
        <textarea id="editor" spellcheck="false" placeholder="# Enter diago diagram code here

server: Web Server
database: Database

server -> database: queries"></textarea>
      </div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <div class="preview-pane">
      <div class="toolbar">
        <div style="display: flex; flex-direction: column; gap: 0.25rem; width: 100%;">
          <div class="toolbar-row">
            <span class="toolbar-label">Format</span>
            <div class="tabs">
              <button class="tab active" data-view="svg">SVG</button>
              <button class="tab" data-view="ascii">ASCII</button>
              <button class="tab" data-view="unicode">Unicode</button>
            </div>
            <div class="spacer"></div>
          </div>
          <div class="toolbar-row">
            <span class="toolbar-label">Engine</span>
            <div class="engine-tabs">
              <button class="engine-tab active" data-engine="dagre">Dagre</button>
              <button class="engine-tab" data-engine="elk">ELK</button>
              <button class="engine-tab" data-engine="railway">Railway</button>
            </div>
            <div class="spacer"></div>
            <div id="svg-controls" class="svg-controls">
              <button id="zoom-out-btn" class="secondary" title="Zoom out">−</button>
              <button id="zoom-reset-btn" class="secondary" title="Reset zoom">100%</button>
              <button id="zoom-in-btn" class="secondary" title="Zoom in">+</button>
            </div>
            <button id="copy-btn" class="secondary">Copy Output</button>
            <button id="download-png-btn" class="secondary" disabled>Download PNG</button>
            <button id="download-pdf-btn" class="secondary" disabled>Export PDF</button>
          </div>
        </div>
      </div>
      <div id="error-banner" class="error-banner" style="display: none;"></div>
      <div id="preview" class="preview-content">
        <div class="status loading">Initializing...</div>
      </div>
    </div>
  </div>

  <script type="module">
    // Example cache
    const exampleCache = {};

    // Load example from examples/ folder
    async function loadExample(name) {
      if (exampleCache[name]) {
        return exampleCache[name];
      }
      try {
        const response = await fetch(`./examples/${name}.d2`);
        if (!response.ok) {
          throw new Error(`Failed to load example: ${response.status}`);
        }
        const content = await response.text();
        exampleCache[name] = content;
        return content;
      } catch (e) {
        console.error(`Error loading example ${name}:`, e);
        return "# Failed to load example.\n# Please refresh and try again.";
      }
    }

    // State
    let wasmModule = null;
    let currentView = 'svg';
    let renderTimeout = null;
    let lastSvgOutput = null;
    let lastRenderOk = false;
    let svgViewport = null;
    let svgCanvas = null;
    let svgScale = 1;
    let lastPointerClientX = null;
    let lastPointerClientY = null;
    let urlSyncTimeout = null;
    let urlSyncSeq = 0;
    const SVG_MIN_SCALE = 0.02;
    const SVG_MAX_SCALE = 8.0;

    // DOM elements
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const errorBanner = document.getElementById('error-banner');
    const copyBtn = document.getElementById('copy-btn');
    const downloadPngBtn = document.getElementById('download-png-btn');
    const downloadPdfBtn = document.getElementById('download-pdf-btn');
    const exampleSelect = document.getElementById('example-select');
    const statusEl = document.getElementById('status');
    const tabs = document.querySelectorAll('.tab');
    const engineTabs = document.querySelectorAll('.engine-tab');
    const editorPane = document.getElementById('editor-pane');
    const resizeHandle = document.getElementById('resize-handle');
    const svgControls = document.getElementById('svg-controls');
    const zoomInBtn = document.getElementById('zoom-in-btn');
    const zoomOutBtn = document.getElementById('zoom-out-btn');
    const zoomResetBtn = document.getElementById('zoom-reset-btn');

    // Engine selection
    const ENGINE_STORAGE_KEY = 'diago.layout_engine';
    let selectedEngine = 'dagre';
    function getSelectedEngine() {
      return selectedEngine;
    }
    function getEngineId() {
      if (selectedEngine === 'elk') return 1;
      if (selectedEngine === 'railway') return 2;
      return 0; // dagre
    }
    // Restore last engine preference
    const savedEngine = localStorage.getItem(ENGINE_STORAGE_KEY);
    if (savedEngine === 'dagre' || savedEngine === 'elk' || savedEngine === 'railway') {
      selectedEngine = savedEngine;
      engineTabs.forEach(tab => {
        tab.classList.toggle('active', tab.dataset.engine === savedEngine);
      });
    }
    engineTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        engineTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedEngine = tab.dataset.engine;
        localStorage.setItem(ENGINE_STORAGE_KEY, selectedEngine);
        render();
      });
    });

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.dataset.view;
        // Clear any pending debounced render to avoid double-render
        clearTimeout(renderTimeout);
        updateExportButtons();
        render();
      });
    });

    // Example loading
    exampleSelect.addEventListener('change', async () => {
      const key = exampleSelect.value;
      if (key) {
        const content = await loadExample(key);
        editor.value = content;
        scheduleScriptUrlSync();
        render();
      }
    });

    // Copy button
    copyBtn.addEventListener('click', () => {
      let content;
      if (currentView === 'ascii' || currentView === 'unicode') {
        const pre = preview.querySelector('pre');
        content = pre ? pre.textContent : preview.textContent;
      } else {
        content = lastSvgOutput ?? preview.innerHTML;
      }
      navigator.clipboard.writeText(content).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Output', 1500);
      });
    });

    function updateExportButtons() {
      const enabled = !!(wasmModule && lastRenderOk && currentView === 'svg' && lastSvgOutput);
      downloadPngBtn.disabled = !enabled;
      downloadPdfBtn.disabled = !enabled;
      const showSvgControls = currentView === 'svg' && lastRenderOk;
      svgControls.style.display = showSvgControls ? 'flex' : 'none';
      if (showSvgControls) {
        zoomOutBtn.disabled = svgScale <= SVG_MIN_SCALE + 1e-6;
        zoomInBtn.disabled = svgScale >= SVG_MAX_SCALE - 1e-6;
      }
    }

    function clampSvgScale(scale) {
      return Math.min(SVG_MAX_SCALE, Math.max(SVG_MIN_SCALE, scale));
    }

    function updateZoomLabel() {
      zoomResetBtn.textContent = `${Math.round(svgScale * 100)}%`;
    }

    function applySvgScale(nextScale, anchorClientX = null, anchorClientY = null) {
      if (!svgViewport || !svgCanvas) return;
      const clamped = clampSvgScale(nextScale);
      if (!Number.isFinite(clamped)) return;
      const oldScale = svgScale;
      if (Math.abs(clamped - oldScale) < 1e-6) {
        updateZoomLabel();
        updateExportButtons();
        return;
      }

      const rect = svgViewport.getBoundingClientRect();
      const anchorX = anchorClientX == null ? rect.left + rect.width / 2 : anchorClientX;
      const anchorY = anchorClientY == null ? rect.top + rect.height / 2 : anchorClientY;
      const viewportX = anchorX - rect.left;
      const viewportY = anchorY - rect.top;
      const baseX = (svgViewport.scrollLeft + viewportX) / oldScale;
      const baseY = (svgViewport.scrollTop + viewportY) / oldScale;

      svgScale = clamped;
      const baseWidth = Number(svgCanvas.dataset.baseWidth || '0');
      const baseHeight = Number(svgCanvas.dataset.baseHeight || '0');
      if (baseWidth > 0 && baseHeight > 0) {
        svgCanvas.style.width = `${baseWidth * svgScale}px`;
        svgCanvas.style.height = `${baseHeight * svgScale}px`;
      }

      svgViewport.scrollLeft = baseX * svgScale - viewportX;
      svgViewport.scrollTop = baseY * svgScale - viewportY;
      updateZoomLabel();
      updateExportButtons();
    }

    function centerSvgInViewport() {
      if (!svgViewport) return;
      svgViewport.scrollLeft = Math.max(0, (svgViewport.scrollWidth - svgViewport.clientWidth) / 2);
      svgViewport.scrollTop = Math.max(0, (svgViewport.scrollHeight - svgViewport.clientHeight) / 2);
    }

    function fitSvgToViewport() {
      if (!svgViewport || !svgCanvas) return;
      const baseWidth = Number(svgCanvas.dataset.baseWidth || '0');
      const baseHeight = Number(svgCanvas.dataset.baseHeight || '0');
      if (!(baseWidth > 0 && baseHeight > 0)) return;
      const viewportWidth = svgViewport.clientWidth;
      const viewportHeight = svgViewport.clientHeight;
      if (!(viewportWidth > 0 && viewportHeight > 0)) return;
      const containScale = Math.min(viewportWidth / baseWidth, viewportHeight / baseHeight, 1);
      svgScale = clampSvgScale(containScale);
      svgCanvas.style.width = `${baseWidth * svgScale}px`;
      svgCanvas.style.height = `${baseHeight * svgScale}px`;
      updateZoomLabel();
      centerSvgInViewport();
      updateExportButtons();
    }

    function currentZoomAnchor() {
      if (!svgViewport) return { x: null, y: null };
      if (lastPointerClientX == null || lastPointerClientY == null) {
        return { x: null, y: null };
      }
      const rect = svgViewport.getBoundingClientRect();
      const inside =
        lastPointerClientX >= rect.left &&
        lastPointerClientX <= rect.right &&
        lastPointerClientY >= rect.top &&
        lastPointerClientY <= rect.bottom;
      if (!inside) return { x: null, y: null };
      return { x: lastPointerClientX, y: lastPointerClientY };
    }

    function bytesToBase64Url(bytes) {
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function base64UrlToBytes(encoded) {
      const normalized = encoded.replace(/-/g, '+').replace(/_/g, '/');
      const padded = normalized + '='.repeat((4 - (normalized.length % 4)) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    async function tryCompressDeflateRaw(input) {
      if (typeof CompressionStream !== 'function') return null;
      try {
        const stream = new CompressionStream('deflate-raw');
        const writer = stream.writable.getWriter();
        await writer.write(input);
        await writer.close();
        return new Uint8Array(await new Response(stream.readable).arrayBuffer());
      } catch (e) {
        return null;
      }
    }

    async function tryDecompressDeflateRaw(bytes) {
      if (typeof DecompressionStream !== 'function') return null;
      try {
        const stream = new DecompressionStream('deflate-raw');
        const writer = stream.writable.getWriter();
        await writer.write(bytes);
        await writer.close();
        const decompressed = new Uint8Array(await new Response(stream.readable).arrayBuffer());
        return new TextDecoder('utf-8').decode(decompressed);
      } catch (e) {
        return null;
      }
    }

    async function compressScriptToParam(raw) {
      const input = new TextEncoder().encode(raw);
      const compressed = await tryCompressDeflateRaw(input);
      if (compressed !== null) {
        return bytesToBase64Url(compressed);
      }
      // Fallback for browsers that do not support deflate-raw in CompressionStream.
      return `u:${bytesToBase64Url(input)}`;
    }

    async function decompressScriptParam(encoded) {
      let mode = '';
      let payload = encoded;
      if (encoded.startsWith('z:') || encoded.startsWith('u:')) {
        mode = encoded.slice(0, 1);
        payload = encoded.slice(2);
      }

      const bytes = base64UrlToBytes(payload);
      if (mode === 'u') {
        return new TextDecoder('utf-8').decode(bytes);
      }
      if (mode === 'z') {
        const decoded = await tryDecompressDeflateRaw(bytes);
        if (decoded === null) {
          throw new Error('deflate-raw decompression is not supported in this browser');
        }
        return decoded;
      }

      // Legacy format (no prefix): try deflate-raw first, then plain UTF-8 fallback.
      const legacyDecoded = await tryDecompressDeflateRaw(bytes);
      if (legacyDecoded !== null) return legacyDecoded;
      return new TextDecoder('utf-8').decode(bytes);
    }

    async function loadScriptFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('script');
      if (!encoded) return null;
      try {
        return await decompressScriptParam(encoded);
      } catch (e) {
        console.warn('Failed to decode script query param:', e);
        return null;
      }
    }

    async function syncScriptToUrl(source) {
      const seq = ++urlSyncSeq;
      try {
        const url = new URL(window.location.href);
        if (!source.trim()) {
          url.searchParams.delete('script');
        } else {
          const encoded = await compressScriptToParam(source);
          if (seq !== urlSyncSeq) return;
          url.searchParams.set('script', encoded);
        }
        if (seq !== urlSyncSeq) return;
        const query = url.searchParams.toString();
        const nextUrl = query ? `${url.pathname}?${query}${url.hash}` : `${url.pathname}${url.hash}`;
        history.replaceState(null, '', nextUrl);
      } catch (e) {
        console.warn('Failed to sync script query param:', e);
      }
    }

    function scheduleScriptUrlSync() {
      clearTimeout(urlSyncTimeout);
      const source = editor.value;
      urlSyncTimeout = setTimeout(() => {
        syncScriptToUrl(source);
      }, 300);
    }

    function setupSvgInteractions() {
      if (!svgViewport || !svgCanvas) return;
      let panning = false;
      let startX = 0;
      let startY = 0;
      let startScrollLeft = 0;
      let startScrollTop = 0;

      function rememberPointer(e) {
        lastPointerClientX = e.clientX;
        lastPointerClientY = e.clientY;
      }

      svgViewport.addEventListener('wheel', (e) => {
        rememberPointer(e);
        e.preventDefault();
        const zoomFactor = Math.exp(-e.deltaY * 0.0015);
        applySvgScale(svgScale * zoomFactor, e.clientX, e.clientY);
      }, { passive: false });

      svgViewport.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        rememberPointer(e);
        panning = true;
        startX = e.clientX;
        startY = e.clientY;
        startScrollLeft = svgViewport.scrollLeft;
        startScrollTop = svgViewport.scrollTop;
        svgViewport.classList.add('panning');
        svgViewport.setPointerCapture(e.pointerId);
        e.preventDefault();
      });

      svgViewport.addEventListener('pointermove', (e) => {
        rememberPointer(e);
        if (!panning) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        svgViewport.scrollLeft = startScrollLeft - dx;
        svgViewport.scrollTop = startScrollTop - dy;
      });

      svgViewport.addEventListener('pointerenter', rememberPointer);

      function stopPanning() {
        panning = false;
        if (svgViewport) svgViewport.classList.remove('panning');
      }

      svgViewport.addEventListener('pointerup', stopPanning);
      svgViewport.addEventListener('pointercancel', stopPanning);
      svgViewport.addEventListener('pointerleave', (e) => {
        if (e.buttons === 0) stopPanning();
      });
    }

    function setupSvgView(svgOutput) {
      preview.className = 'preview-content svg-mode';
      preview.innerHTML = '<div class="svg-viewport"><div class="svg-canvas"></div></div>';
      svgViewport = preview.querySelector('.svg-viewport');
      svgCanvas = preview.querySelector('.svg-canvas');
      svgCanvas.innerHTML = svgOutput;

      const size = parseSvgSize(svgOutput);
      svgCanvas.dataset.baseWidth = String(size.width);
      svgCanvas.dataset.baseHeight = String(size.height);
      svgScale = 1;
      svgCanvas.style.width = `${size.width}px`;
      svgCanvas.style.height = `${size.height}px`;

      const rootSvg = svgCanvas.querySelector('svg');
      if (rootSvg) {
        rootSvg.style.width = '100%';
        rootSvg.style.height = '100%';
        rootSvg.style.display = 'block';
      }

      setupSvgInteractions();
      requestAnimationFrame(() => fitSvgToViewport());
    }

    function parseSvgSize(svgText) {
      try {
        const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
        const svg = doc.documentElement;
        const widthAttr = svg.getAttribute('width') || '';
        const heightAttr = svg.getAttribute('height') || '';
        const width = parseFloat(widthAttr.replace('px', ''));
        const height = parseFloat(heightAttr.replace('px', ''));
        if (Number.isFinite(width) && Number.isFinite(height) && width > 0 && height > 0) {
          return { width, height };
        }
        const viewBox = svg.getAttribute('viewBox') || '';
        const parts = viewBox.split(/\s+/).filter(Boolean).map(Number);
        if (parts.length === 4 && parts.every(n => Number.isFinite(n))) {
          const vbWidth = parts[2];
          const vbHeight = parts[3];
          if (vbWidth > 0 && vbHeight > 0) {
            return { width: vbWidth, height: vbHeight };
          }
        }
      } catch (_) {}
      return { width: 800, height: 600 };
    }

    async function downloadPngFromSvg(svgText, filename = 'diagram.png') {
      const { width, height } = parseSvgSize(svgText);
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.floor(width * scale));
      canvas.height = Math.max(1, Math.floor(height * scale));
      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('Canvas not supported');
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      const svgUrl = URL.createObjectURL(svgBlob);
      try {
        const img = new Image();
        img.decoding = 'async';
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = () => reject(new Error('Failed to load SVG'));
          img.src = svgUrl;
        });
        ctx.drawImage(img, 0, 0);
      } finally {
        URL.revokeObjectURL(svgUrl);
      }

      const pngBlob = await new Promise((resolve, reject) => {
        canvas.toBlob((b) => {
          if (!b) reject(new Error('PNG export failed'));
          else resolve(b);
        }, 'image/png');
      });
      const pngUrl = URL.createObjectURL(pngBlob);
      try {
        const a = document.createElement('a');
        a.href = pngUrl;
        a.download = filename;
        a.click();
      } finally {
        URL.revokeObjectURL(pngUrl);
      }
    }

    function exportPdfFromSvg(svgText) {
      const w = window.open('', '_blank');
      if (!w) {
        throw new Error('Popup blocked');
      }
      w.document.open();
      w.document.write(`<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Diago Export</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { display: flex; align-items: center; justify-content: center; }
      svg { max-width: 100vw; max-height: 100vh; }
      @media print { body { background: #fff; } }
    </style>
  </head>
  <body>
    ${svgText}
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => window.print(), 50);
      });
    <\/script>
  </body>
</html>`);
      w.document.close();
      w.focus();
    }

    downloadPngBtn.addEventListener('click', async () => {
      try {
        await downloadPngFromSvg(lastSvgOutput);
      } catch (e) {
        errorBanner.textContent = 'Failed to export PNG.';
        errorBanner.style.display = 'block';
      }
    });

    downloadPdfBtn.addEventListener('click', () => {
      try {
        exportPdfFromSvg(lastSvgOutput);
      } catch (e) {
        errorBanner.textContent = 'Failed to export PDF.';
        errorBanner.style.display = 'block';
      }
    });

    zoomInBtn.addEventListener('click', () => {
      const anchor = currentZoomAnchor();
      applySvgScale(svgScale * 1.2, anchor.x, anchor.y);
    });

    zoomOutBtn.addEventListener('click', () => {
      const anchor = currentZoomAnchor();
      applySvgScale(svgScale / 1.2, anchor.x, anchor.y);
    });

    zoomResetBtn.addEventListener('click', () => {
      if (!svgCanvas) return;
      svgScale = 1;
      const baseWidth = Number(svgCanvas.dataset.baseWidth || '0');
      const baseHeight = Number(svgCanvas.dataset.baseHeight || '0');
      if (baseWidth > 0 && baseHeight > 0) {
        svgCanvas.style.width = `${baseWidth}px`;
        svgCanvas.style.height = `${baseHeight}px`;
      }
      updateZoomLabel();
      requestAnimationFrame(() => centerSvgInViewport());
      updateExportButtons();
    });

    // Auto-render on input (debounced)
    editor.addEventListener('input', () => {
      clearTimeout(renderTimeout);
      scheduleScriptUrlSync();
      renderTimeout = setTimeout(render, 300);
    });

    // Resize handle
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const containerRect = document.querySelector('.container').getBoundingClientRect();
      const newWidth = e.clientX - containerRect.left;
      const minWidth = 250;
      const maxWidth = containerRect.width - 300;
      if (newWidth >= minWidth && newWidth <= maxWidth) {
        editorPane.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // Renderer loading
    async function loadWasm() {
      try {
        statusEl.textContent = 'Loading renderer...';
        statusEl.className = 'status loading';

        const response = await fetch('./wasm.wasm');
        if (!response.ok) {
          throw new Error(`Failed to fetch WASM: ${response.status}`);
        }

        const wasmBytes = await response.arrayBuffer();
        const result = await WebAssembly.instantiate(wasmBytes, {
          spectest: {
            print_char: (c) => console.log(String.fromCharCode(c)),
            print_i32: (i) => console.log(i),
            print_f64: (f) => console.log(f),
          }
        });

        wasmModule = result.instance.exports;
        statusEl.textContent = 'Ready';
        statusEl.className = 'status ready';
        render();
      } catch (e) {
        console.error('WASM load error:', e);
        statusEl.textContent = 'Renderer unavailable';
        statusEl.className = 'status error';
        showPlaceholder();
      }
    }

    function showPlaceholder() {
      preview.className = 'preview-content dark';
      preview.innerHTML = `
        <div style="text-align: center; color: #666;">
          <p style="margin-bottom: 0.75rem;">Failed to initialize the renderer.</p>
          <p style="font-size: 0.8rem;">Please refresh the page and try again.</p>
        </div>
      `;
    }

    function formatRenderErrorMessage(raw) {
      const text = String(raw ?? '').trim();
      if (text.length === 0) {
        return 'Failed to render diagram.';
      }
      if (text.startsWith('Error: Parse errors:')) {
        return 'Syntax error in diagram source.';
      }
      if (
        text.startsWith('Error: IR error:') ||
        text.startsWith('Error: Graph error:') ||
        text.startsWith('Error: Layout error:')
      ) {
        return 'Failed to layout diagram. Please check syntax and connections.';
      }
      if (text.startsWith('Error: ')) {
        return text.slice('Error: '.length);
      }
      return text;
    }

    function setInput(str) {
      // Encode string as UTF-8 bytes
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      const len = bytes.length;
      wasmModule.set_input(len);
      for (let i = 0; i < len; i++) {
        wasmModule.write_input_byte(i, bytes[i]);
      }
    }

    function getOutput() {
      const len = wasmModule.get_output_len();
      // Read bytes into a Uint8Array for proper UTF-8 decoding
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = wasmModule.read_output_byte(i);
      }
      // Use TextDecoder to properly handle multi-byte UTF-8 characters
      const decoder = new TextDecoder('utf-8');
      return decoder.decode(bytes);
    }

    function render() {
      const source = editor.value;
      errorBanner.style.display = 'none';
      lastRenderOk = false;
      if (currentView === 'svg') {
        lastSvgOutput = null;
      }
      updateExportButtons();

      if (!source.trim()) {
        preview.className = 'preview-content dark';
        preview.innerHTML = '<div style="color: #666;">Enter diago code to see the diagram</div>';
        return;
      }

      if (!wasmModule) {
        showPlaceholder();
        return;
      }

      try {
        setInput(source);
        const engineId = getEngineId();

        let status;
        if (currentView === 'ascii') {
          status = typeof wasmModule.render_ascii_with_engine === 'function'
            ? wasmModule.render_ascii_with_engine(engineId)
            : wasmModule.render_ascii();
        } else if (currentView === 'unicode') {
          status = typeof wasmModule.render_unicode_with_engine === 'function'
            ? wasmModule.render_unicode_with_engine(engineId)
            : wasmModule.render_unicode();
        } else {
          status = typeof wasmModule.render_svg_with_engine === 'function'
            ? wasmModule.render_svg_with_engine(engineId)
            : wasmModule.render_svg();
        }

        const output = getOutput();

        if (status !== 0) {
          errorBanner.textContent = formatRenderErrorMessage(output);
          errorBanner.style.display = 'block';
          updateExportButtons();
          return;
        }

        // Clear previous content first to avoid flash of old content with new styles
        preview.innerHTML = '';
        svgViewport = null;
        svgCanvas = null;
        svgScale = 1;
        lastPointerClientX = null;
        lastPointerClientY = null;

        if (currentView === 'ascii' || currentView === 'unicode') {
          preview.className = 'preview-content ascii-mode';
          const pre = document.createElement('pre');
          pre.className = 'ascii-output';
          pre.textContent = output;
          preview.appendChild(pre);
        } else {
          setupSvgView(output);
          lastSvgOutput = output;
        }
        lastRenderOk = true;
        updateExportButtons();
      } catch (e) {
        errorBanner.textContent = 'Failed to render diagram.';
        errorBanner.style.display = 'block';
        updateExportButtons();
      }
    }

    // Handle Tab key in editor
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    // Initialize
    async function init() {
      const scriptFromUrl = await loadScriptFromUrl();
      if (scriptFromUrl !== null) {
        editor.value = scriptFromUrl;
        exampleSelect.value = '';
      } else {
        editor.value = await loadExample('hello');
        exampleSelect.value = 'hello';
        scheduleScriptUrlSync();
      }
      loadWasm();
    }
    init();
  </script>
</body>
</html>
