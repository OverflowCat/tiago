<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diago Playground - diago Diagram Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #16213e;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }
    header h1 span {
      color: #e94560;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-right a {
      color: #888;
      text-decoration: none;
      font-size: 0.875rem;
    }
    .header-right a:hover {
      color: #fff;
    }
    .container {
      display: flex;
      height: calc(100vh - 52px);
    }
    .editor-pane {
      width: 40%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f3460;
    }
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane-header {
      background: #16213e;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    textarea {
      flex: 1;
      background: #0f0f23;
      color: #e0e0e0;
      border: none;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    textarea::placeholder {
      color: #444;
    }
    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: auto;
      background: #fff;
    }
    .preview-content.dark {
      background: #0f0f23;
    }
    .preview-content svg {
      max-width: 100%;
      max-height: 100%;
    }
    .preview-content.ascii-mode {
      display: block;
      padding: 0;
    }
    .ascii-output {
      background: #0f0f23;
      color: #00ff88;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre;
      padding: 1rem;
      margin: 0;
      overflow: auto;
      text-align: left;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }
    .toolbar {
      background: #16213e;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid #0f3460;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
    }
    button:hover {
      background: #ff6b6b;
    }
    button:disabled {
      background: #444;
      cursor: not-allowed;
    }
    button.secondary {
      background: #0f3460;
    }
    button.secondary:hover {
      background: #1a4a7a;
    }
    .tabs {
      display: flex;
      gap: 0;
    }
    .tab {
      background: transparent;
      border-radius: 0;
      color: #888;
      padding: 0.4rem 1rem;
    }
    .tab:hover {
      background: #0f3460;
      color: #fff;
    }
    .tab.active {
      background: #0f3460;
      color: #fff;
    }
    .engine-tabs {
      display: flex;
      gap: 0;
      margin-left: 0.5rem;
    }
    .engine-tab {
      background: transparent;
      border-radius: 0;
      color: #666;
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
    }
    .engine-tab:hover {
      background: #0f3460;
      color: #fff;
    }
    .engine-tab.active {
      background: #e94560;
      color: #fff;
    }
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toolbar-label {
      color: #888;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .spacer {
      flex: 1;
    }
    .error-banner {
      background: #3d1a1a;
      color: #ff6b6b;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      border-bottom: 1px solid #5a2a2a;
    }
    .status {
      font-size: 0.75rem;
      color: #666;
    }
    .status.ready {
      color: #00ff88;
    }
    .status.loading {
      color: #ffaa00;
    }
    .status.error {
      color: #ff6b6b;
    }
    .resize-handle {
      width: 4px;
      background: #0f3460;
      cursor: col-resize;
      transition: background 0.2s;
    }
    .resize-handle:hover {
      background: #e94560;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Diago</span> Playground</h1>
    <div class="header-right">
      <span id="status" class="status loading">Loading WASM...</span>
      <a href="https://github.com/moonbitlang/diago" target="_blank">GitHub</a>
    </div>
  </header>

  <div class="container">
    <div class="editor-pane" id="editor-pane">
      <div class="pane-header">
        <span>diago Source</span>
        <select id="example-select">
          <option value="hello">Hello World</option>
          <option value="basic">Basic Features</option>
          <option value="shapes">Shape Types</option>
          <option value="styles">Styling</option>
          <option value="containers">Containers</option>
          <option value="classes">Classes</option>
          <option value="sql_tables">SQL Tables</option>
          <option value="variables">Variables</option>
          <option value="directions">Directions</option>
          <option value="grid">Grid Layout</option>
          <option value="sequence">Sequence Diagram</option>
          <option value="architecture">Architecture</option>
          <option value="arrowheads">Arrowheads</option>
          <option value="c4">C4 Diagram</option>
          <option value="layers">Layers</option>
        </select>
      </div>
      <div class="editor-wrapper">
        <textarea id="editor" spellcheck="false" placeholder="# Enter diago diagram code here

server: Web Server
database: Database

server -> database: queries"></textarea>
      </div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <div class="preview-pane">
      <div class="toolbar">
        <div style="display: flex; flex-direction: column; gap: 0.25rem; width: 100%;">
          <div class="toolbar-row">
            <span class="toolbar-label">Format</span>
            <div class="tabs">
              <button class="tab active" data-view="svg">SVG</button>
              <button class="tab" data-view="ascii">ASCII</button>
              <button class="tab" data-view="unicode">Unicode</button>
            </div>
            <div class="spacer"></div>
          </div>
          <div class="toolbar-row">
            <span class="toolbar-label">Engine</span>
            <div class="engine-tabs">
              <button class="engine-tab active" data-engine="dagre">Dagre</button>
              <button class="engine-tab" data-engine="railway">Railway</button>
            </div>
            <div class="spacer"></div>
            <button id="copy-btn" class="secondary">Copy Output</button>
            <button id="download-png-btn" class="secondary" disabled>Download PNG</button>
            <button id="download-pdf-btn" class="secondary" disabled>Export PDF</button>
          </div>
        </div>
      </div>
      <div id="error-banner" class="error-banner" style="display: none;"></div>
      <div id="preview" class="preview-content">
        <div class="status loading">Initializing...</div>
      </div>
    </div>
  </div>

  <script type="module">
    // Example cache
    const exampleCache = {};

    // Load example from examples/ folder
    async function loadExample(name) {
      if (exampleCache[name]) {
        return exampleCache[name];
      }
      try {
        const response = await fetch(`./examples/${name}.d2`);
        if (!response.ok) {
          throw new Error(`Failed to load example: ${response.status}`);
        }
        const content = await response.text();
        exampleCache[name] = content;
        return content;
      } catch (e) {
        console.error(`Error loading example ${name}:`, e);
        return `# Failed to load example: ${name}\n# ${e.message}`;
      }
    }

    // State
    let wasmModule = null;
    let currentView = 'svg';
    let renderTimeout = null;
    let lastSvgOutput = null;
    let lastRenderOk = false;

    // DOM elements
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const errorBanner = document.getElementById('error-banner');
    const copyBtn = document.getElementById('copy-btn');
    const downloadPngBtn = document.getElementById('download-png-btn');
    const downloadPdfBtn = document.getElementById('download-pdf-btn');
    const exampleSelect = document.getElementById('example-select');
    const statusEl = document.getElementById('status');
    const tabs = document.querySelectorAll('.tab');
    const engineTabs = document.querySelectorAll('.engine-tab');
    const editorPane = document.getElementById('editor-pane');
    const resizeHandle = document.getElementById('resize-handle');

    // Engine selection
    const ENGINE_STORAGE_KEY = 'diago.layout_engine';
    let selectedEngine = 'dagre';
    function getSelectedEngine() {
      return selectedEngine;
    }
    function getEngineId() {
      if (selectedEngine === 'railway') return 2;
      return 1; // dagre
    }
    // Restore last engine preference
    const savedEngine = localStorage.getItem(ENGINE_STORAGE_KEY);
    if (savedEngine === 'dagre' || savedEngine === 'railway') {
      selectedEngine = savedEngine;
      engineTabs.forEach(tab => {
        tab.classList.toggle('active', tab.dataset.engine === savedEngine);
      });
    }
    engineTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        engineTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedEngine = tab.dataset.engine;
        localStorage.setItem(ENGINE_STORAGE_KEY, selectedEngine);
        render();
      });
    });

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.dataset.view;
        // Clear any pending debounced render to avoid double-render
        clearTimeout(renderTimeout);
        updateExportButtons();
        render();
      });
    });

    // Example loading
    exampleSelect.addEventListener('change', async () => {
      const key = exampleSelect.value;
      if (key) {
        const content = await loadExample(key);
        editor.value = content;
        render();
      }
    });

    // Copy button
    copyBtn.addEventListener('click', () => {
      let content;
      if (currentView === 'ascii' || currentView === 'unicode') {
        const pre = preview.querySelector('pre');
        content = pre ? pre.textContent : preview.textContent;
      } else {
        content = preview.innerHTML;
      }
      navigator.clipboard.writeText(content).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Output', 1500);
      });
    });

    function updateExportButtons() {
      const enabled = !!(wasmModule && lastRenderOk && currentView === 'svg' && lastSvgOutput);
      downloadPngBtn.disabled = !enabled;
      downloadPdfBtn.disabled = !enabled;
    }

    function parseSvgSize(svgText) {
      try {
        const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
        const svg = doc.documentElement;
        const widthAttr = svg.getAttribute('width') || '';
        const heightAttr = svg.getAttribute('height') || '';
        const width = parseFloat(widthAttr.replace('px', ''));
        const height = parseFloat(heightAttr.replace('px', ''));
        if (Number.isFinite(width) && Number.isFinite(height) && width > 0 && height > 0) {
          return { width, height };
        }
        const viewBox = svg.getAttribute('viewBox') || '';
        const parts = viewBox.split(/\s+/).filter(Boolean).map(Number);
        if (parts.length === 4 && parts.every(n => Number.isFinite(n))) {
          const vbWidth = parts[2];
          const vbHeight = parts[3];
          if (vbWidth > 0 && vbHeight > 0) {
            return { width: vbWidth, height: vbHeight };
          }
        }
      } catch (_) {}
      return { width: 800, height: 600 };
    }

    async function downloadPngFromSvg(svgText, filename = 'diagram.png') {
      const { width, height } = parseSvgSize(svgText);
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.floor(width * scale));
      canvas.height = Math.max(1, Math.floor(height * scale));
      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('Canvas not supported');
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      const svgUrl = URL.createObjectURL(svgBlob);
      try {
        const img = new Image();
        img.decoding = 'async';
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = () => reject(new Error('Failed to load SVG'));
          img.src = svgUrl;
        });
        ctx.drawImage(img, 0, 0);
      } finally {
        URL.revokeObjectURL(svgUrl);
      }

      const pngBlob = await new Promise((resolve, reject) => {
        canvas.toBlob((b) => {
          if (!b) reject(new Error('PNG export failed'));
          else resolve(b);
        }, 'image/png');
      });
      const pngUrl = URL.createObjectURL(pngBlob);
      try {
        const a = document.createElement('a');
        a.href = pngUrl;
        a.download = filename;
        a.click();
      } finally {
        URL.revokeObjectURL(pngUrl);
      }
    }

    function exportPdfFromSvg(svgText) {
      const w = window.open('', '_blank');
      if (!w) {
        throw new Error('Popup blocked');
      }
      w.document.open();
      w.document.write(`<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Diago Export</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { display: flex; align-items: center; justify-content: center; }
      svg { max-width: 100vw; max-height: 100vh; }
      @media print { body { background: #fff; } }
    </style>
  </head>
  <body>
    ${svgText}
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => window.print(), 50);
      });
    <\/script>
  </body>
</html>`);
      w.document.close();
      w.focus();
    }

    downloadPngBtn.addEventListener('click', async () => {
      try {
        await downloadPngFromSvg(lastSvgOutput);
      } catch (e) {
        errorBanner.textContent = 'PNG export error: ' + e.message;
        errorBanner.style.display = 'block';
      }
    });

    downloadPdfBtn.addEventListener('click', () => {
      try {
        exportPdfFromSvg(lastSvgOutput);
      } catch (e) {
        errorBanner.textContent = 'PDF export error: ' + e.message;
        errorBanner.style.display = 'block';
      }
    });

    // Auto-render on input (debounced)
    editor.addEventListener('input', () => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(render, 300);
    });

    // Resize handle
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const containerRect = document.querySelector('.container').getBoundingClientRect();
      const newWidth = e.clientX - containerRect.left;
      const minWidth = 250;
      const maxWidth = containerRect.width - 300;
      if (newWidth >= minWidth && newWidth <= maxWidth) {
        editorPane.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // WASM loading
    async function loadWasm() {
      try {
        statusEl.textContent = 'Loading WASM...';
        statusEl.className = 'status loading';

        const response = await fetch('./wasm.wasm');
        if (!response.ok) {
          throw new Error(`Failed to fetch WASM: ${response.status}`);
        }

        const wasmBytes = await response.arrayBuffer();
        const result = await WebAssembly.instantiate(wasmBytes, {
          spectest: {
            print_char: (c) => console.log(String.fromCharCode(c)),
            print_i32: (i) => console.log(i),
            print_f64: (f) => console.log(f),
          }
        });

        wasmModule = result.instance.exports;
        statusEl.textContent = 'Ready';
        statusEl.className = 'status ready';
        render();
      } catch (e) {
        console.error('WASM load error:', e);
        statusEl.textContent = 'WASM not available';
        statusEl.className = 'status error';
        showPlaceholder();
      }
    }

    function showPlaceholder() {
      preview.className = 'preview-content dark';
      preview.innerHTML = `
        <div style="text-align: center; color: #666;">
          <p style="margin-bottom: 1rem;">WASM module not loaded.</p>
          <p style="font-size: 0.8rem;">Build with: <code style="background: #1a1a2e; padding: 0.25rem 0.5rem; border-radius: 4px;">moon build --target wasm</code></p>
          <p style="font-size: 0.8rem; margin-top: 0.5rem;">Then copy <code style="background: #1a1a2e; padding: 0.25rem 0.5rem; border-radius: 4px;">target/wasm/release/build/cmd/wasm/wasm.wasm</code> to <code style="background: #1a1a2e; padding: 0.25rem 0.5rem; border-radius: 4px;">web/</code></p>
        </div>
      `;
    }

    function setInput(str) {
      // Encode string as UTF-8 bytes
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      const len = bytes.length;
      wasmModule.set_input(len);
      for (let i = 0; i < len; i++) {
        wasmModule.write_input_byte(i, bytes[i]);
      }
    }

    function getOutput() {
      const len = wasmModule.get_output_len();
      // Read bytes into a Uint8Array for proper UTF-8 decoding
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = wasmModule.read_output_byte(i);
      }
      // Use TextDecoder to properly handle multi-byte UTF-8 characters
      const decoder = new TextDecoder('utf-8');
      return decoder.decode(bytes);
    }

    function render() {
      const source = editor.value;
      errorBanner.style.display = 'none';
      lastRenderOk = false;
      if (currentView === 'svg') {
        lastSvgOutput = null;
      }
      updateExportButtons();

      if (!source.trim()) {
        preview.className = 'preview-content dark';
        preview.innerHTML = '<div style="color: #666;">Enter diago code to see the diagram</div>';
        return;
      }

      if (!wasmModule) {
        showPlaceholder();
        return;
      }

      try {
        setInput(source);
        const engineId = getEngineId();

        let status;
        if (currentView === 'ascii') {
          status = typeof wasmModule.render_ascii_with_engine === 'function'
            ? wasmModule.render_ascii_with_engine(engineId)
            : wasmModule.render_ascii();
        } else if (currentView === 'unicode') {
          status = typeof wasmModule.render_unicode_with_engine === 'function'
            ? wasmModule.render_unicode_with_engine(engineId)
            : wasmModule.render_unicode();
        } else {
          status = typeof wasmModule.render_svg_with_engine === 'function'
            ? wasmModule.render_svg_with_engine(engineId)
            : wasmModule.render_svg();
        }

        const output = getOutput();

        if (status !== 0) {
          errorBanner.textContent = output;
          errorBanner.style.display = 'block';
          updateExportButtons();
          return;
        }

        // Clear previous content first to avoid flash of old content with new styles
        preview.innerHTML = '';

        if (currentView === 'ascii' || currentView === 'unicode') {
          preview.className = 'preview-content ascii-mode';
          const pre = document.createElement('pre');
          pre.className = 'ascii-output';
          pre.textContent = output;
          preview.appendChild(pre);
        } else {
          preview.className = 'preview-content';
          preview.innerHTML = output;
          lastSvgOutput = output;
        }
        lastRenderOk = true;
        updateExportButtons();
      } catch (e) {
        errorBanner.textContent = 'Render error: ' + e.message;
        errorBanner.style.display = 'block';
        updateExportButtons();
      }
    }

    // Handle Tab key in editor
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    // Initialize
    async function init() {
      editor.value = await loadExample('hello');
      exampleSelect.value = 'hello';
      loadWasm();
    }
    init();
  </script>
</body>
</html>
