<script type="text/javascript"><![CDATA[function switchLayer(layerId, tabEl) {
  var layers = ['base-layer', 'layer-0', 'layer-1', 'layer-2'];
  layers.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = (id === layerId) ? 'block' : 'none';
  });
  var tabs = document.querySelectorAll('.layer-tab');
  tabs.forEach(function(t) {
    t.classList.remove('selected');
    t.style.fill = '#f0f0f0';
  });
  if (tabEl) {
    tabEl.classList.add('selected');
    tabEl.style.fill = '#ffffff';
  }
}
]]></script>
