name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          moon version --all
          moon update

      - name: Build WASM
        run: |
          moon build --target wasm
          # Locate WASM output generated by current moon build layout
          WASM_PATH="$(find _build -type f -path '*/build/cmd/wasm/wasm.wasm' | head -n 1)"
          if [ -z "$WASM_PATH" ]; then
            echo "wasm artifact not found under _build"
            exit 1
          fi
          cp "$WASM_PATH" web/wasm.wasm
          # Copy examples to web directory
          rm -rf web/examples
          cp -r examples web/examples

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Some org/repo configurations disallow enabling Pages via GITHUB_TOKEN.
          # Enable GitHub Pages once in repo settings, then keep this disabled.
          enablement: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
